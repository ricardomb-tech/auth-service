spring.application.name=auth-service

# ===============================
# DATABASE CONFIGURATION (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# El esquema es propiedad exclusiva de Flyway (AD-7) — Hibernate solo valida.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# ===============================
# ACTUATOR (AD-16) — sin exponer públicamente todavía; Epic 5 configura
# grupos liveness/readiness y el puerto de management separado.
# ===============================
management.endpoints.web.exposure.include=none

# ===============================
# TOKENS DE VERIFICACIÓN Y REFRESH (AD-10, NFR-7 — configurable, ver AuthTokenProperties)
# ===============================
auth.token.verification-ttl=24h
auth.token.refresh-ttl=7d

# ===============================
# JWT (AD-3, AD-19 — HS256, rotación con par activo+anterior, ver JwtProperties)
# ===============================
auth.jwt.secret-current=${JWT_SECRET_CURRENT}
auth.jwt.secret-previous=${JWT_SECRET_PREVIOUS:}
auth.jwt.access-ttl=15m
auth.jwt.issuer=auth-service

# ===============================
# OAUTH2 (AD-17, Story 2.1 — login federado con Google; GitHub es Story 2.2)
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

auth.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI}
auth.oauth2.failure-redirect-uri=${OAUTH2_FAILURE_REDIRECT_URI}
