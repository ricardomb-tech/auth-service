spring.application.name=auth-service

# ===============================
# DATABASE CONFIGURATION (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# El esquema es propiedad exclusiva de Flyway (AD-7) — Hibernate solo valida.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# ===============================
# ACTUATOR (AD-16) — puerto de management separado del tráfico de negocio;
# nunca listado como público en SecurityConfig (AD-11). Al vivir en un
# puerto HTTP distinto, Spring Boot no registra estas rutas en el
# DispatcherServlet del puerto de negocio: no hace falta (ni se debe)
# añadir "/actuator/**" a PUBLIC_ENDPOINTS de SecurityConfig.
# ===============================
management.server.port=8081
management.endpoints.web.exposure.include=health,prometheus,info
management.prometheus.metrics.export.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.show-details=always

# ===============================
# LOGGING ESTRUCTURADO + TRAZAS (AD-16) — Boot 3.4 trae structured logging
# nativo (sin logstash-logback-encoder ni logback-spring.xml a mano); el
# formato "logstash" incluye el contenido del MDC (traceId/spanId) en el
# JSON de cada línea automáticamente.
# ===============================
logging.structured.format.console=logstash

# Sampling al 100% en dev/test: el AC pide traceId en "cada línea de log",
# no solo en las peticiones muestreadas. Ajustable en prod vía env var si
# el volumen de tráfico lo justifica.
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}

# Sin colector OTLP en docker-compose todavía [ASSUMPTION] — el exportador
# queda configurado (endpoint estándar, overrideable) pero una caída de
# conexión al collector no rompe ninguna petición de negocio; solo loggea
# el intento de export fallido.
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# ===============================
# TOKENS DE VERIFICACIÓN Y REFRESH (AD-10, NFR-7 — configurable, ver AuthTokenProperties)
# ===============================
auth.token.verification-ttl=24h
auth.token.refresh-ttl=7d
auth.token.password-reset-ttl=1h

# ===============================
# BLOQUEO POR FUERZA BRUTA (NFR-7 — configurable, ver LockoutProperties)
# ===============================
auth.lockout.threshold=5
auth.lockout.lock-duration=15m

# ===============================
# ADMINISTRADOR INICIAL (FR-12, NFR-7 — opcional, ver AdminBootstrapProperties)
# ===============================
auth.admin.email=${AUTH_ADMIN_EMAIL:}
auth.admin.password=${AUTH_ADMIN_PASSWORD:}

# ===============================
# JWT (AD-3, AD-19 — HS256, rotación con par activo+anterior, ver JwtProperties)
# ===============================
auth.jwt.secret-current=${JWT_SECRET_CURRENT}
auth.jwt.secret-previous=${JWT_SECRET_PREVIOUS:}
auth.jwt.access-ttl=15m
auth.jwt.issuer=auth-service

# ===============================
# OAUTH2 (AD-17, Story 2.1 — login federado con Google; Story 2.2 — GitHub)
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# El scope por defecto de CommonOAuth2Provider.GITHUB es solo read:user;
# user:email es imprescindible para poder llamar a GET /user/emails
# (GitHubOAuth2UserService, Story 2.2) y resolver el email primario verificado.
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

auth.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI}
auth.oauth2.failure-redirect-uri=${OAUTH2_FAILURE_REDIRECT_URI}
